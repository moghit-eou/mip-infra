---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # This name will be overridden by the federation-specific kustomize patch
  name: mip-stack
  namespace: argocd-mip-team
  annotations:
    argocd.argoproj.io/sync-wave: '2'
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  sources:
    - repoURL: https://github.com/Medical-Informatics-Platform/mip
      targetRevision: 76fa985d226d83539cd9e5a3cbcf08a2465f9408  # 9.0.3
      path: deployment/kubernetes
      helm:
        valueFiles:
          - values.yaml
          - $values/deployments/shared-apps/mip-stack/values.yaml
    - repoURL: https://github.com/Medical-Informatics-Platform/mip-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    # This will be overridden by the federation-specific kustomize patch
    namespace: placeholder-namespace
  syncPolicy:
    syncOptions: [CreateNamespace=true, ApplyOutOfSyncOnly=true]
    automated:
      selfHeal: true
