---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: haproxy-public
  namespace: ingress-nginx
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: haproxy-public-controller
rules:
  - apiGroups: ['']
    resources:
      - configmaps
      - endpoints
      - nodes
      - pods
      - secrets
      - services
      - namespaces
      - serviceaccounts
    verbs: [list, watch, get]
  - apiGroups: ['']
    resources: [nodes]
    verbs: [get]
  - apiGroups: ['']
    resources: [services]
    verbs: [get, list, watch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses, ingressclasses]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses/status]
    verbs: [update, patch]
  - apiGroups: [extensions]
    resources: [ingresses, ingresses/status]
    verbs: [get, list, watch, update, patch]
  - apiGroups: ['']
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [list, watch, get]
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [replicasets, deployments, daemonsets]
    verbs: [get, list]
  - apiGroups: [ingress.v1.haproxy.org]
    resources: ['*']
    verbs: [get, list, watch, update]
  - apiGroups: [ingress.v3.haproxy.org]
    resources: ['*']
    verbs: [get, list, watch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: haproxy-public-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: haproxy-public-controller
subjects:
  - kind: ServiceAccount
    name: haproxy-public
    namespace: ingress-nginx
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: haproxy-public-leader-election
  namespace: ingress-nginx
rules:
  # ConfigMap write for HAProxy KIC state management (namespace-scoped)
  - apiGroups: ['']
    resources: [configmaps]
    verbs: [create, update, patch]
  # Leader election via Lease
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create, get, list, watch, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: haproxy-public-leader-election
  namespace: ingress-nginx
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: haproxy-public-leader-election
subjects:
  - kind: ServiceAccount
    name: haproxy-public
    namespace: ingress-nginx
