---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datacatalog
  namespace: argocd-mip-team  # This is the namespace where Argo CD runs
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: mip-argo-project-common
  sources:
    - repoURL: https://github.com/Medical-Informatics-Platform/datacatalog
      targetRevision: bd558c42b988be413738078cf40f30d37a670be1  # 2.0.0
      path: kubernetes
      helm:
        valueFiles: [values.yaml, $values/common/datacatalog/values.yaml]
    - repoURL: https://github.com/Medical-Informatics-Platform/mip-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: mip-common-datacatalog
  syncPolicy:
    syncOptions: [CreateNamespace=true, ApplyOutOfSyncOnly=true]
    automated:
      selfHeal: true
