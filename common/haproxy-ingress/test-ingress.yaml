---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-haproxy-public
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-haproxy-public
  template:
    metadata:
      labels:
        app: test-haproxy-public
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: test-haproxy-public-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-haproxy-public-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>haproxy-public Ingress Test</title>
    </head>
    <body>
        <h1>🎉 haproxy-public IngressClass Working!</h1>
        <p>This page is served through the haproxy-public IngressClass.</p>
        <p>Using existing nginx controller with dedicated IP.</p>
        <p>IP: 148.187.27.148</p>
        <p>IngressClass: haproxy-public</p>
    </body>
    </html>
---
apiVersion: v1
kind: Service
metadata:
  name: test-haproxy-public
  namespace: default
spec:
  selector:
    app: test-haproxy-public
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-haproxy-public
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    haproxy.org/path-rewrite: /(.*) /
spec:
  ingressClassName: haproxy-public
  rules:
    - host: test.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: test-haproxy-public
                port:
                  number: 80
