---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: haproxy-public-selfsigned
  namespace: ingress-nginx
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: haproxy-public-default-tls
  namespace: ingress-nginx
spec:
  secretName: haproxy-public-default-tls
  commonName: '*.mip.chuv.cscs.ch'
  dnsNames: ['*.mip.chuv.cscs.ch']
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: haproxy-public-selfsigned
