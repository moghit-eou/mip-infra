---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy-public-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: haproxy-public
    app.kubernetes.io/instance: haproxy-public
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: haproxy-public
      app.kubernetes.io/instance: haproxy-public
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: haproxy-public
        app.kubernetes.io/instance: haproxy-public
        app.kubernetes.io/component: controller
        app.kubernetes.io/managed-by: argocd
    spec:
      serviceAccountName: haproxy-public
      containers:
        - name: controller
          image: haproxytech/kubernetes-ingress:3.2.6
          imagePullPolicy: IfNotPresent
          args:
            - --configmap=ingress-nginx/haproxy
            - --publish-service=ingress-nginx/haproxy-public-controller
            - --ingress.class=haproxy-public
            - --leader-election-namespace=ingress-nginx
          env:
            - name: TZ
              value: Etc/UTC
            - name: POD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - name: POD_NAME
              valueFrom: {fieldRef: {fieldPath: metadata.name}}
            - name: POD_IP
              valueFrom: {fieldRef: {fieldPath: status.podIP}}
          ports:
            - name: http
              containerPort: 8080
            - name: https
              containerPort: 8443
            - name: controller
              containerPort: 6060
          livenessProbe:
            httpGet: {path: /healthz, port: controller}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: {path: /healthz, port: controller}
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {add: [NET_BIND_SERVICE], drop: [ALL]}
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            seccompProfile: {type: RuntimeDefault}
          volumeMounts:
            - name: run
              mountPath: /run
            - name: tmp
              mountPath: /tmp
            - name: var-state
              mountPath: /var/state
      volumes:
        - name: run
          emptyDir: {medium: Memory}
        - name: tmp
          emptyDir: {medium: Memory}
        - name: var-state
          emptyDir: {medium: Memory}
      nodeSelector:
        kubernetes.io/os: linux
      terminationGracePeriodSeconds: 300
