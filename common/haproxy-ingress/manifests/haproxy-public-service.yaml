---
apiVersion: v1
kind: Service
metadata:
  name: haproxy-public-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: haproxy-public
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: argocd
  annotations:
    # MetalLB annotations to ensure we get the specific IP
    metallb.io/address-pool: pool-no-auto
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local  # preserves client IPs
  # Request specific IP from MetalLB pool-no-auto
  loadBalancerIP: 148.187.143.44
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
    - name: https
      port: 443
      protocol: TCP
      targetPort: https
  selector:
    app.kubernetes.io/name: haproxy-public
    app.kubernetes.io/instance: haproxy-public
    app.kubernetes.io/component: controller
